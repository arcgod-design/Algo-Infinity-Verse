<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Algo Infinity Verse</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body data-page="login">
    <div id="navbar-placeholder"></div>

    <main class="auth-page">
      <section class="auth-panel glass-card">
        <div class="auth-brand">
          <span class="auth-mark">∞</span>
          <h1>Welcome Back</h1>
          <p>Log in to continue your DSA journey.</p>
        </div>

        <form class="auth-form" data-auth-form="login" novalidate>
          <div class="form-group">
            <label for="email">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              required
            />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
            />
          </div>
          <p class="auth-message" data-auth-message aria-live="polite"></p>
          <button class="btn btn-primary auth-submit" type="submit">
            <i class="fas fa-right-to-bracket"></i>
            <span>Log In</span>
          </button>
        </form>

        <div class="auth-divider">
          <span>or</span>
        </div>

        <button type="button" class="btn btn-google-auth" data-auth-google aria-label="Sign in with Google">
          <svg class="google-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          <span>Sign in with Google</span>
        </button>

        <p class="auth-switch">
          New here?
          <a href="signup.html">Create an account</a>
        </p>
      </section>
    </main>

    <script src="firebase-client.js"></script>
    <script src="auth.js"></script>
    <script>
      const menuToggle = document.getElementById("menuToggle");
      const navLinks = document.getElementById("navLinks");

      let overlay = document.querySelector(".nav-overlay");
      if (!overlay && menuToggle && navLinks) {
        overlay = document.createElement("div");
        overlay.className = "nav-overlay";
        document.body.appendChild(overlay);
      }

      const toggleMenu = (open) => {
        const isOpen = open !== undefined ? open : !navLinks.classList.contains("active");
        navLinks.classList.toggle("active", isOpen);
        menuToggle.setAttribute("aria-expanded", isOpen);
        if (overlay) overlay.classList.toggle("active", isOpen);
        document.body.style.overflow = isOpen ? "hidden" : "";
        const icon = menuToggle.querySelector("i");
        if (icon) {
          icon.classList.toggle("fa-bars", !isOpen);
          icon.classList.toggle("fa-times", isOpen);
        }
      };

      const closeMenu = () => {
        if (!navLinks.classList.contains("active")) return;
        toggleMenu(false);
      };

      if (menuToggle && navLinks) {
        menuToggle.addEventListener("click", (e) => {
          e.stopPropagation();
          toggleMenu();
        });

        if (overlay) overlay.addEventListener("click", closeMenu);

        navLinks.querySelectorAll("a").forEach((link) => {
          link.addEventListener("click", closeMenu);
        });
      }
    </script>
  
  <script>
    loadPartial('navbar-placeholder', '/partials/navbar.html');
    loadPartial('footer-placeholder', '/partials/footer.html');
  </script>
</body>
</html>
